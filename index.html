<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <title>Music Player --- Samia</title>
</head>

<body>
    <div class="container">
        <div class="music-player">
            <nav>
                <div class="circle" onclick="goBack()">
                    <i class="fa-solid fa-angle-left"></i>
                </div>

                <div class="circle" onclick="togglePlaylist()">
                    <i class="fa-solid fa-bars"></i>
                </div>
            </nav>

            <img src="./media/all is well.jpg" alt="all is well" class="song-img">
            <h1>All is well</h1>
            <p>Sonu Nigam Swanand Kirkire Shaan</p>

            <audio id="song"
                src="./media/Aal Izz Well – 3 Idiots Aamir Khan Madhavan Sharman J Sonu N Swanand K Shaan Shantanu M.mp3"
                type="audio/mpeg">
            </audio>
            <input type="range" value="0" id="progress">
            <div class="time-display">
                <span id="current-time">0:00</span> / <span id="duration">0:00</span>
            </div>

            <div class="controls">
                <div onclick="prevSong()">
                    <i class="fa-solid fa-backward"></i>
                </div>
                <div onclick="playPause()">
                    <i class="fa-solid fa-play" id="ctrlIcon"></i>
                </div>
                <div onclick="nextSong()">
                    <i class="fa-solid fa-forward"></i>
                </div>
            </div>

            <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
            <div id="playlist-panel" class="playlist-panel">
                <h3>Up Next</h3>
                <ul id="playlist-items">
                </ul>
            </div>

        </div>

        <script src="script.js"></script>

</body>

</html>
